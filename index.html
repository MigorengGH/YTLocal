<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YTlocal</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Draggable titlebar area for frameless window dragging -->
    <div class="titlebar">
        <button id="settings-btn" class="settings-top-btn" title="App Settings">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="3"></circle>
                <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
            </svg>
            <span style="font-size: 0.8rem; font-weight: 600; margin-left: 5px;">Settings</span>
        </button>

        <div id="window-controls" class="window-controls">
            <button id="minimize-btn" class="control-btn minimize" title="Minimize">
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"></line></svg>
            </button>
            <button id="close-btn" class="control-btn close" title="Close">
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
            </button>
        </div>
    </div>

    <div class="container">
        <header>
            <img src="YTlocal.png" class="app-logo" alt="YTlocal">
            <p>Paste a link to download</p>
        </header>

        <div class="content-wrapper">
            <div class="input-group" style="display: flex; gap: 0.4rem;">
                <input type="text" id="url-input" placeholder="https://youtube.com/..." autocomplete="off" style="flex: 1; min-width: 0;">
                <button id="paste-btn" class="secondary-btn" style="width: auto; padding: 0.5rem 0.7rem; flex-shrink: 0;" title="Paste Link">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 4px;"><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"></path><rect x="8" y="2" width="8" height="4" rx="1" ry="1"></rect></svg>
                    Paste
                </button>
            </div>




            <div id="video-preview-container" class="preview-card hidden">
                <img id="preview-thumbnail" src="" class="preview-thumb">
                <div class="preview-info">
                    <div id="preview-title" class="preview-title"></div>
                    <div id="preview-channel" class="preview-channel"></div>
                    <div id="preview-duration" class="preview-duration"></div>
                </div>
            </div>

            <div id="playlist-container" class="playlist-card hidden">
                <div class="playlist-header">
                    <label class="checkbox-label" style="margin:0;">
                        <input type="checkbox" id="playlist-select-all" checked>
                        <span>Select All</span>
                    </label>
                    <span id="playlist-count" class="playlist-count-label">0 items</span>
                </div>
                <div id="playlist-items" class="playlist-items">
                    <!-- Dynamic items -->
                </div>
            </div>

            <div class="format-toggle">
                <div class="toggle-option">
                    <input type="radio" id="format-video" name="format" value="video" checked>
                    <label for="format-video" class="toggle-btn">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="23 7 16 12 23 17 23 7"></polygon><rect x="1" y="5" width="15" height="14" rx="2" ry="2"></rect></svg>
                        Video
                    </label>
                </div>
                <div class="toggle-option">
                    <input type="radio" id="format-audio" name="format" value="audio">
                    <label for="format-audio" class="toggle-btn">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18V5l12-2v13"></path><circle cx="6" cy="18" r="3"></circle><circle cx="18" cy="16" r="3"></circle></svg>
                        Music
                    </label>
                </div>
            </div>

            <div class="options-section">
                <label>Quality / Format</label>
                <div id="quality-buttons" class="quality-grid">
                    <!-- Dynamic buttons -->
                </div>

            </div>


            <div class="options-section">
                <label>Save to</label>
                <button id="folder-btn" class="secondary-btn">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 6px;"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path></svg>
                    <span id="folder-path" class="muted-text">Downloads</span>
                </button>
            </div>


            <div class="options-card" style="margin-top: 0.2rem;">
                <label class="options-card-title">
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 4px; vertical-align: middle;"><path d="M12 2a10 10 0 1 0 10 10c0-1-1-2-2-2h-2c-1 0-2-1-2-2V4c0-1-1-2-2-2z"></path><circle cx="7.5" cy="10.5" r=".5"></circle><circle cx="11.5" cy="14.5" r=".5"></circle><circle cx="16.5" cy="11.5" r=".5"></circle></svg>Cookies (for bot bypass)
                </label>
                <select id="cookies-select" class="secondary-btn">
                    <option value="none">Don't use cookies (Default)</option>
                    <option value="chrome">Chrome</option>
                    <option value="safari">Safari</option>
                    <option value="edge">Edge</option>
                    <option value="firefox">Firefox</option>
                </select>
            </div>

            <button id="download-btn">Download</button>
            <button id="cancel-btn" style="display: none; width: 100%; padding: 0.85rem; font-size: 1rem; font-weight: 700; color: #ef4444; background: rgba(239, 68, 68, 0.1); border: 1px solid #ef4444; border-radius: 8px; cursor: pointer; transition: all 0.2s ease;">Cancel</button>

            <div id="status-container" class="hidden" style="margin-top: 0.6rem; margin-bottom: 0.4rem; min-width: 0;">
                <div class="status-header">
                    <div style="display: flex; align-items: center; gap: 6px; flex: 1; min-width: 0;">
                        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" style="animation: spin 1s linear infinite; flex-shrink: 0;">
                            <line x1="12" y1="2" x2="12" y2="6"></line>
                            <line x1="12" y1="18" x2="12" y2="22"></line>
                            <line x1="4.93" y1="4.93" x2="7.76" y2="7.76"></line>
                            <line x1="16.24" y1="16.24" x2="19.07" y2="19.07"></line>
                            <line x1="2" y1="12" x2="6" y2="12"></line>
                            <line x1="18" y1="12" x2="22" y2="12"></line>
                            <line x1="4.93" y1="19.07" x2="7.76" y2="16.24"></line>
                            <line x1="16.24" y1="7.76" x2="19.07" y2="4.93"></line>
                        </svg>
                        <span id="status-text" style="white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1; min-width: 0; line-height: 1.2;">Starting...</span>
                    </div>
                    <span id="status-percent">0%</span>
                </div>
                <div class="progress-bar-bg">
                    <div id="progress-bar" class="progress-bar-fill"></div>
                </div>
                <div id="download-info-row" class="download-info-row">
                    <span id="speed-text"></span>
                    <span id="eta-text"></span>
                </div>
            </div>
        </div>

        <div class="info-notes-container">
            <p class="recommend-note">
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink: 0;"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="16" x2="12" y2="12"></line><line x1="12" y1="8" x2="12.01" y2="8"></line></svg>
                <span>Copy links from <strong>Google Chrome</strong> for best compatibility.</span>
            </p>
        </div>

    </div>



    <!-- Settings Overlay -->
    <div id="settings-overlay" class="settings-overlay hidden">
        <div class="settings-panel">
            <div class="settings-header">
                <h3>Settings</h3>
                <button id="settings-close-btn" class="settings-close-btn">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                </button>
            </div>
            
            <div class="settings-body">
                <div class="settings-about">
                    <div class="settings-app-name">YTlocal</div>
                    <div class="settings-app-version">v1.1.0</div>
                    <div class="settings-credit-inline">
                        <span class="credit-author">created by <strong>Fahimi Amir</strong></span>
                        <span class="credit-powered">powered by <strong>yt-dlp</strong></span>
                    </div>
                </div>

                <div class="settings-divider"></div>

                <div class="options-card" style="width: 100%;">
                    <label class="options-card-title">
                        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 4px; vertical-align: middle;"><path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"></path><line x1="7" y1="7" x2="7.01" y2="7"></line></svg>Metadata Options
                    </label>
                    <div class="checkbox-group">
                        <label class="checkbox-label">
                            <input type="checkbox" id="embed-thumbnail">
                            <span>Embed Thumbnail (requires ffprobe)</span>
                        </label>
                        <label class="checkbox-label">
                            <input type="checkbox" id="embed-metadata" checked>
                            <span>Embed Metadata (ID3 tags)</span>
                        </label>
                        <p class="settings-tip-note">
                            💡 Disabling metadata speeds up download and prevents post-processing errors.
                        </p>
                    </div>
                </div>

                <div class="settings-divider"></div>

                <div class="options-card" style="width: 100%;">
                    <label class="options-card-title">
                        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 4px; vertical-align: middle;"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>Subtitles & Language
                    </label>
                    <div class="checkbox-group">
                        <label class="checkbox-label">
                            <input type="checkbox" id="write-subs">
                            <span>Download Subtitles (.srt/.vtt)</span>
                        </label>

                        <input type="text" id="sub-langs" placeholder="Langs (e.g. en,es,all)" class="time-input" style="margin-top: 5px; font-size: 0.8rem; padding: 0.4rem; width: 100%;">
                    </div>
                </div>

                <div class="settings-divider"></div>

                <div class="options-card" style="width: 100%;">
                    <label class="options-card-title">
                        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 4px; vertical-align: middle;">
                            <path d="M7 4v16M7 4l-4 4M7 4l4 4M17 20V4M17 20l-4-4M17 20l4-4" />
                        </svg>Download Speed Limit
                    </label>
                    <select id="speed-limit" class="secondary-btn">
                        <option value="unlimited">Unlimited (Default)</option>
                        <option value="1M">1 MB/s</option>
                        <option value="2.5M">2.5 MB/s</option>
                        <option value="5M">5 MB/s</option>
                        <option value="10M">10 MB/s</option>
                    </select>
                </div>



                <button id="update-btn" class="secondary-btn update-action-btn" style="width: 100%; justify-content: center; gap: 6px; padding: 0.65rem 0.85rem; font-size: 0.85rem; font-weight: 600;">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"></polyline><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path></svg>
                    Update / Reinstall App
                </button>
            </div>
        </div>
    </div>

    <script src="renderer.js"></script>
</body>
</html>
