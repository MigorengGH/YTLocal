<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YTlocal</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Draggable titlebar area for frameless window dragging -->
    <div class="titlebar"></div>

    <div class="container">
        <header>
            <img src="YTlocal.png" class="app-logo" alt="YTlocal">
            <p>Paste a link to download</p>
        </header>

        <div class="content-wrapper">
            <div class="input-group">
                <input type="text" id="url-input" placeholder="https://youtube.com/..." autocomplete="off">
            </div>

            <div class="format-toggle">
                <div class="toggle-option">
                    <input type="radio" id="format-video" name="format" value="video" checked>
                    <label for="format-video" class="toggle-btn">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="23 7 16 12 23 17 23 7"></polygon><rect x="1" y="5" width="15" height="14" rx="2" ry="2"></rect></svg>
                        Video
                    </label>
                </div>
                <div class="toggle-option">
                    <input type="radio" id="format-audio" name="format" value="audio">
                    <label for="format-audio" class="toggle-btn">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18V5l12-2v13"></path><circle cx="6" cy="18" r="3"></circle><circle cx="18" cy="16" r="3"></circle></svg>
                        Music
                    </label>
                </div>
            </div>

            <div class="options-section">
                <label>Quality / Format</label>
                <div id="quality-buttons" class="quality-grid">
                    <!-- Dynamic buttons -->
                </div>
            </div>

            <div class="options-section">
                <label>Save to / Options</label>
                <div style="display: flex; gap: 0.4rem;">
                    <button id="folder-btn" class="secondary-btn" style="flex: 2; overflow: hidden; padding-right: 0.5rem;">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 6px; flex-shrink: 0;"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path></svg>
                        <span id="folder-path" class="muted-text">Downloads</span>
                    </button>
                    <button id="update-btn" class="secondary-btn" style="flex: 1; padding: 0; justify-content: center;" title="Update yt-dlp">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 4px;"><path d="M21.5 2v6h-6M2.13 15.57a9 9 0 1 0 3.84-10.36L2 8"></path></svg>
                        Update
                    </button>
                </div>
            </div>

            <button id="download-btn">Download</button>
        </div>

        <div id="status-container" class="hidden">
            <div class="status-header">
                <span id="status-text">Starting...</span>
                <span id="status-percent">0%</span>
            </div>
            <div class="progress-bar-bg">
                <div id="progress-bar" class="progress-bar-fill"></div>
            </div>
        </div>
        
        <div class="footer-tag" style="text-align: center; margin-top: 15px; font-size: 0.7rem; color: var(--text-muted); opacity: 0.7;">
            created by Fahimi Amir powered by yt-dlp
        </div>
    </div>
    <script src="renderer.js"></script>
</body>
</html>
